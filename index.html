<!DOCTYPE html>
<html>
  <head>
    <title>JavaScript Sandbox</title>
    <meta charset="UTF-8" />
  </head>

  <body>
    <h1>Hello</h1>

    <div id="buttons" style="margin-bottom: 20px">
      <button id="overlayBtn">Turn on overlay effect</button>
      <button id="offBtn">turn off overlay</button>
    </div>

    <div id="container">
      <div id="overlayHair" style="display: none">
        <img src="/src/assets/base_aw2.png" />
      </div>

      <div id="base">
        <img src="/src/assets/hair_aw11.png" />
      </div>
    </div>

    <script>
      alert("script loaded");
      const overlayHair = document.getElementById("overlayHair");
      const overlayBtn = document.getElementById("overlayBtn");
      const offBtn = document.getElementById("offBtn");

      console.log(overlayHair);
      console.log(overlayBtn);
      console.log(offBtn);

      overlayBtn.addEventListener("click", () => {
        console.log("ON clicked");
        overlayHair.style.display = "block";
      });

      offBtn.addEventListener("click", () => {
        console.log("OFF clicked");
        overlayHair.style.display = "none";
      });
    </script>
  </body>
</html>
